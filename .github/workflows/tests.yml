name: CI/CD - Run All Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      # Checkout code
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup Python
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pytest pytest-cov pytest-xdist flake8 black isort mypy

          # Install all requirements
          pip install -r requirements.txt
          pip install -r po-agent-workspace/agents/requirements.txt
          pip install -r em-agent-workspace/agents/requirements.txt
          pip install -r ux-agent-workspace/agents/requirements.txt
          pip install -r backend-agent-workspace/agents/requirements.txt
          pip install -r frontend-agent-workspace/agents/requirements.txt
          pip install -r team_orchestrator/requirements.txt

      # Code quality checks
      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

      - name: Check code formatting with black
        run: |
          black --check . || true
        continue-on-error: true

      - name: Check import sorting with isort
        run: |
          isort --check-only . || true
        continue-on-error: true

      # Run tests
      - name: Run Orchestrator Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest team_orchestrator/tests/ -v --cov=team_orchestrator --cov-report=xml --tb=short

      - name: Run PO Agent Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest po-agent-workspace/tests/ -v --cov=po_agent_workspace --cov-report=xml --tb=short
        continue-on-error: true

      - name: Run EM Agent Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest em-agent-workspace/tests/ -v --cov=em_agent_workspace --cov-report=xml --tb=short
        continue-on-error: true

      - name: Run UX Agent Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest ux-agent-workspace/tests/ -v --cov=ux_agent_workspace --cov-report=xml --tb=short
        continue-on-error: true

      - name: Run Backend Agent Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest backend-agent-workspace/tests/ -v --cov=backend_agent_workspace --cov-report=xml --tb=short
        continue-on-error: true

      - name: Run Frontend Agent Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest frontend-agent-workspace/tests/ -v --cov=frontend_agent_workspace --cov-report=xml --tb=short
        continue-on-error: true

      # Upload coverage reports
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

      # Test documentation examples
      - name: Verify Documentation Examples
        run: |
          # Check that QUICK_START.md commands are valid
          python run_team_pipeline.py config
          python run_team_pipeline.py routes
        continue-on-error: true

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: ai-sdlc-team:latest

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  notify:
    runs-on: ubuntu-latest
    needs: [test, build-docker]
    if: always()

    steps:
      - name: Determine job status
        id: status
        run: |
          if [ "${{ needs.test.result }}" == "success" ] && [ "${{ needs.build-docker.result }}" == "success" ]; then
            echo "status=✅ All tests passed" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          else
            echo "status=❌ Some tests failed" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          fi

      - name: Notify Slack (if configured)
        if: vars.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "AI SDLC Team - CI/CD Pipeline",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ steps.status.outputs.status }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        continue-on-error: true
