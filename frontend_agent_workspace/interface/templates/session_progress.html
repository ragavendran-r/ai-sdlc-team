{% extends "base.html" %}
{% block content %}

<h1>Running Frontend pipeline</h1>
<p class="muted">{{ session.session_name }}</p>

<div id="error-box" class="banner" style="background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;display:none;"></div>

<ul class="steps" data-progress-session="{{ session.session_id }}">
  {% for node, label in steps %}
  <li data-node="{{ node }}">{{ label }}</li>
  {% endfor %}
</ul>

<p class="muted">This page updates automatically. You'll be taken to the review
screen when the components are ready.</p>

{% endblock %}
