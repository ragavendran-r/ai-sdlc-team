<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <style>
    :root {
      --green: #16a34a;
      --amber: #d97706;
      --red: #dc2626;
      --gray: #6b7280;
      --primary: #1d4ed8;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #ffffff;
      color: #111827;
      margin: 0;
      line-height: 1.5;
    }
    nav {
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav .brand { font-weight: 600; text-decoration: none; color: #111827; }
    nav .links a { margin-left: 16px; text-decoration: none; color: var(--primary); }
    main { max-width: 900px; margin: 0 auto; padding: 24px; }
    footer {
      max-width: 900px; margin: 0 auto; padding: 24px;
      color: var(--gray); font-size: 13px; border-top: 1px solid var(--border);
    }
    h1 { font-size: 24px; font-weight: 600; }
    h2 { font-size: 18px; font-weight: 600; margin-top: 28px; }
    .card {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .badge {
      display: inline-block;
      border-radius: 999px;
      font-size: 12px;
      padding: 2px 10px;
      color: #ffffff;
    }
    .badge-gray { background: var(--gray); }
    .badge-green { background: var(--green); }
    .badge-amber { background: var(--amber); }
    .badge-red { background: var(--red); }
    button, .btn {
      border-radius: 6px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 14px;
      border: 1px solid var(--border);
      background: #ffffff;
      color: #111827;
      text-decoration: none;
      display: inline-block;
    }
    .btn-primary, button.btn-primary {
      background: var(--primary); color: #ffffff; border-color: var(--primary);
    }
    .btn-green { background: var(--green); color: #ffffff; border-color: var(--green); }
    .btn-red { background: var(--red); color: #ffffff; border-color: var(--red); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .banner {
      border-radius: 8px; padding: 14px 18px; margin-bottom: 16px;
      border: 1px solid var(--border);
    }
    .banner-amber { background: #fffbeb; border-color: var(--amber); color: #92400e; }
    .banner-red { background: #fef2f2; border-color: var(--red); color: #991b1b; }
    .banner-green { background: #f0fdf4; border-color: var(--green); color: #166534; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; padding: 8px; border-bottom: 1px solid var(--border); }
    label { display: block; font-weight: 500; margin: 12px 0 4px; }
    input[type=text], select, textarea {
      width: 100%; padding: 8px; border: 1px solid var(--border);
      border-radius: 6px; font-size: 14px; font-family: inherit;
    }
    .muted { color: var(--gray); font-size: 13px; }
    .row { display: flex; gap: 12px; align-items: center; justify-content: space-between; }
  </style>
</head>
<body>
  <nav>
    <a class="brand" href="/">PO Workspace</a>
    <span class="links">
      <a href="/">Home</a>
      <a href="/backlog">Backlog</a>
    </span>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>ai-sdlc-team template</footer>
  {% block scripts %}{% endblock %}
</body>
</html>
