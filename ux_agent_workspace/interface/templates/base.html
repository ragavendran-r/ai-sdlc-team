<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem;
      color: #111827; background: #f9fafb; line-height: 1.5;
    }
    a { color: #1d4ed8; }
    h1, h2, h3 { line-height: 1.25; }
    .muted { color: #6b7280; }
    .card {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 10px;
      padding: 1.25rem; margin-bottom: 1rem;
    }
    .btn {
      display: inline-block; padding: 0.55rem 1rem; border-radius: 8px;
      border: 1px solid transparent; background: #1d4ed8; color: #fff;
      font-size: 0.95rem; cursor: pointer; text-decoration: none;
    }
    .btn:hover { background: #1e40af; }
    .btn.secondary { background: #fff; color: #1d4ed8; border-color: #c7d2fe; }
    .btn.danger { background: #dc2626; }
    .btn.ghost { background: transparent; color: #374151; border-color: #d1d5db; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .row { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
    .badge {
      display: inline-block; padding: 0.15rem 0.6rem; border-radius: 999px;
      font-size: 0.8rem; font-weight: 600;
    }
    .badge.green { background: #dcfce7; color: #166534; }
    .badge.amber { background: #fef3c7; color: #92400e; }
    .badge.red { background: #fee2e2; color: #991b1b; }
    .badge.gray { background: #f3f4f6; color: #374151; }
    .badge.blue { background: #dbeafe; color: #1e40af; }
    input, textarea, select {
      width: 100%; padding: 0.6rem; border: 1px solid #d1d5db;
      border-radius: 8px; font-size: 0.95rem; font-family: inherit;
    }
    label { font-weight: 600; display: block; margin-bottom: 0.35rem; }
    .field { margin-bottom: 1rem; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .steps { list-style: none; padding: 0; }
    .steps li { padding: 0.5rem 0.75rem; border-radius: 8px; margin-bottom: 0.4rem; background: #fff; border: 1px solid #e5e7eb; }
    .steps li.active { border-color: #1d4ed8; box-shadow: 0 0 0 2px #dbeafe; }
    .steps li.done { background: #f0fdf4; border-color: #bbf7d0; }
    .steps li.done::before { content: "✓ "; color: #16a34a; font-weight: 700; }
    .banner { padding: 1rem 1.25rem; border-radius: 10px; margin-bottom: 1rem; }
    .banner.amber { background: #fef3c7; border: 1px solid #fde68a; color: #92400e; }
    .banner.green { background: #dcfce7; border: 1px solid #bbf7d0; color: #166534; }
    /* Tabs */
    .tabs { display: flex; gap: 0.25rem; border-bottom: 2px solid #e5e7eb; margin-bottom: 1rem; }
    .tab-btn {
      padding: 0.6rem 1rem; border: none; background: transparent; cursor: pointer;
      font-size: 0.95rem; color: #6b7280; border-bottom: 2px solid transparent;
      margin-bottom: -2px;
    }
    .tab-btn.active { color: #1d4ed8; border-bottom-color: #1d4ed8; font-weight: 600; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>
  <div class="topbar">
    <strong>{{ title }}</strong>
    <nav class="row">
      <a href="/">Home</a>
      <a href="/sessions/new">New session</a>
    </nav>
  </div>
  {% block content %}{% endblock %}
  <script src="/static/app.js"></script>
</body>
</html>
